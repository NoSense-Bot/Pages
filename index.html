<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent — Logs</title>
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #13161e;
    --border:    #1e2330;
    --text:      #c8cdd8;
    --muted:     #4a5068;
    --green:     #3dd68c;
    --red:       #f25f5c;
    --yellow:    #f5c542;
    --blue:      #5b9cf6;
    --purple:    #a78bfa;
    --orange:    #fb923c;
    --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: .02em;
  }

  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  .dot.offline {
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    animation: none;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: .4; }
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: var(--muted);
  }

  #status-text { color: var(--green); }
  #status-text.offline { color: var(--red); }

  .btn {
    background: var(--border);
    border: 1px solid #2a2f40;
    color: var(--text);
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 11px;
    transition: background .15s;
  }
  .btn:hover  { background: #1e2330; }
  .btn.active { background: #1a2a1a; border-color: var(--green); color: var(--green); }

  /* ── Toolbar / filtros ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }

  .filter-label { color: var(--muted); font-size: 11px; margin-right: 4px; }

  .chip {
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 11px;
    color: var(--muted);
    transition: all .15s;
    background: transparent;
    font-family: var(--font-mono);
  }
  .chip:hover { border-color: #3a4060; color: var(--text); }

  .chip.on.info     { background: #1a2535; color: var(--blue);   border-color: var(--blue); }
  .chip.on.acao     { background: #251e35; color: var(--purple); border-color: var(--purple); }
  .chip.on.envio    { background: #1e2535; color: var(--blue);   border-color: var(--blue); }
  .chip.on.resposta { background: #1a2535; color: #7dd3fc;       border-color: #7dd3fc; }
  .chip.on.ok       { background: #0f2318; color: var(--green);  border-color: var(--green); }
  .chip.on.erro     { background: #2a1010; color: var(--red);    border-color: var(--red); }
  .chip.on.espera   { background: #2a2010; color: var(--yellow); border-color: var(--yellow); }
  .chip.on.hb       { background: #2a1018; color: var(--orange); border-color: var(--orange); }
  .chip.on.timer    { background: #1a1a2a; color: var(--purple); border-color: var(--purple); }

  /* ── Lista de logs ── */
  main {
    flex: 1;
    padding: 12px 24px;
    overflow-y: auto;
  }

  .log-entry {
    display: grid;
    grid-template-columns: 80px 100px 1fr;
    gap: 0 12px;
    padding: 7px 0;
    border-bottom: 1px solid #111318;
    line-height: 1.5;
    animation: fadeIn .2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: none; }
  }

  .log-time { color: var(--muted); white-space: nowrap; }

  .log-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: .05em;
    height: 18px;
    align-self: start;
    margin-top: 2px;
    white-space: nowrap;
  }

  .badge-info     { background: #1a2535; color: var(--blue); }
  .badge-acao     { background: #251e35; color: var(--purple); }
  .badge-envio    { background: #1e2535; color: var(--blue); }
  .badge-resposta { background: #1a2535; color: #7dd3fc; }
  .badge-ok       { background: #0f2318; color: var(--green); }
  .badge-erro     { background: #2a1010; color: var(--red); }
  .badge-espera   { background: #2a2010; color: var(--yellow); }
  .badge-hb       { background: #2a1018; color: var(--orange); }
  .badge-timer    { background: #1a1a2a; color: var(--purple); }

  .log-body  { word-break: break-word; }
  .log-msg   { color: var(--text); }

  .log-detail {
    margin-top: 5px;
    padding: 6px 10px;
    background: #0a0c10;
    border-left: 2px solid var(--border);
    border-radius: 0 4px 4px 0;
    color: var(--muted);
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* ── Footer ── */
  footer {
    padding: 8px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    flex-wrap: wrap;
    gap: 8px;
  }

  #ngrok-url { color: var(--muted); word-break: break-all; }

  /* ── Empty state ── */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 12px;
    color: var(--muted);
  }
  .empty-icon { font-size: 40px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="dot" id="dot"></div>
    AI Agent
  </div>
  <div class="status-bar">
    <span id="status-text">conectando...</span>
    <span id="ultima-att">—</span>
    <button class="btn active" id="btn-auto" onclick="toggleAuto()">⟳ auto</button>
    <button class="btn" onclick="buscarLogs()">atualizar</button>
  </div>
</header>

<div class="toolbar">
  <span class="filter-label">filtrar:</span>
  <button class="chip on info"     data-tipo="info"     onclick="toggleFiltro(this)">ℹ info</button>
  <button class="chip on acao"     data-tipo="acao"     onclick="toggleFiltro(this)">🖱 ação</button>
  <button class="chip on envio"    data-tipo="envio"    onclick="toggleFiltro(this)">📤 envio</button>
  <button class="chip on resposta" data-tipo="resposta" onclick="toggleFiltro(this)">📥 resposta</button>
  <button class="chip on ok"       data-tipo="ok"       onclick="toggleFiltro(this)">✓ ok</button>
  <button class="chip on erro"     data-tipo="erro"     onclick="toggleFiltro(this)">✗ erro</button>
  <button class="chip on espera"   data-tipo="espera"   onclick="toggleFiltro(this)">⏳ espera</button>
  <button class="chip on hb"       data-tipo="hb"       onclick="toggleFiltro(this)">💓 heartbeat</button>
  <button class="chip on timer"    data-tipo="timer"    onclick="toggleFiltro(this)">⏰ timer</button>
</div>

<main id="lista">
  <div class="empty">
    <div class="empty-icon">⟳</div>
    <div>Carregando logs...</div>
  </div>
</main>

<footer>
  <span>últimas <span id="contador">0</span> entradas</span>
  <span id="ngrok-url">—</span>
  <span id="proxima-att">—</span>
</footer>

<script>
// ── Estado ────────────────────────────────────────────────────
let NGROK_URL     = "";
let autoAtualizar = true;
let intervaloAuto = null;
let filtrosAtivos = new Set([
  "info","acao","envio","resposta","ok","erro","espera","hb","timer"
]);

const ICONES = {
  info:"ℹ", acao:"🖱", envio:"📤", resposta:"📥",
  ok:"✓", erro:"✗", espera:"⏳", hb:"💓", timer:"⏰"
};

// ── Carrega ngrok_url.json do GitHub Pages ────────────────────
async function carregarNgrokUrl() {
  try {
    const r = await fetch("ngrok_url.json?t=" + Date.now());
    const d = await r.json();
    NGROK_URL = d.url.replace(/\/$/, "") + "/logs";
    document.getElementById("ngrok-url").textContent =
      "🔗 " + d.url + "  (att: " + d.atualizado + ")";
    return true;
  } catch (e) {
    document.getElementById("ngrok-url").textContent = "⚠ ngrok_url.json não encontrado";
    return false;
  }
}

// ── Busca logs no servidor ngrok ──────────────────────────────
async function buscarLogs() {
  if (!NGROK_URL) {
    const ok = await carregarNgrokUrl();
    if (!ok) return setOffline("sem URL do ngrok");
  }

  try {
    const r = await fetch(NGROK_URL + "?t=" + Date.now(), {
      headers: {
        "ngrok-skip-browser-warning": "true"  // pula a página de aviso do ngrok
      }
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const logs = await r.json();
    renderizar(logs);
    setOnline();
    document.getElementById("ultima-att").textContent =
      "att " + new Date().toLocaleTimeString("pt-BR");

    // Recarrega a URL — pode ter renovado
    carregarNgrokUrl();

  } catch (e) {
    setOffline(e.message);
    await carregarNgrokUrl();
  }
}

// ── Renderiza a lista ─────────────────────────────────────────
function renderizar(logs) {
  const lista    = document.getElementById("lista");
  const visiveis = logs.filter(l => filtrosAtivos.has(l.tipo));

  document.getElementById("contador").textContent = visiveis.length;

  if (!visiveis.length) {
    lista.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <div>Nenhum log para os filtros selecionados</div>
    </div>`;
    return;
  }

  // Mais recente no topo
  lista.innerHTML = [...visiveis].reverse().map(l => {
    const icone  = ICONES[l.tipo] || "•";
    const detalhe = l.detalhe
      ? `<div class="log-detail">${esc(l.detalhe)}</div>`
      : "";
    return `<div class="log-entry">
      <span class="log-time">${esc(l.hora)}</span>
      <span class="log-badge badge-${esc(l.tipo)}">${icone} ${esc(l.tipo.toUpperCase())}</span>
      <div class="log-body">
        <div class="log-msg">${esc(l.msg)}</div>
        ${detalhe}
      </div>
    </div>`;
  }).join("");
}

// ── Online / Offline ──────────────────────────────────────────
function setOnline() {
  document.getElementById("dot").classList.remove("offline");
  const st = document.getElementById("status-text");
  st.textContent = "online";
  st.classList.remove("offline");
}

function setOffline(motivo) {
  document.getElementById("dot").classList.add("offline");
  const st = document.getElementById("status-text");
  st.textContent = "offline — " + motivo;
  st.classList.add("offline");
}

// ── Auto-atualização a cada 10s ───────────────────────────────
function toggleAuto() {
  autoAtualizar = !autoAtualizar;
  document.getElementById("btn-auto").classList.toggle("active", autoAtualizar);
  if (autoAtualizar) {
    iniciarAuto();
  } else {
    clearInterval(intervaloAuto);
    document.getElementById("proxima-att").textContent = "auto: pausado";
  }
}

function iniciarAuto() {
  clearInterval(intervaloAuto);
  let restante = 10;
  document.getElementById("proxima-att").textContent = `próx: ${restante}s`;
  intervaloAuto = setInterval(() => {
    restante--;
    document.getElementById("proxima-att").textContent = `próx: ${restante}s`;
    if (restante <= 0) {
      restante = 10;
      buscarLogs();
    }
  }, 1000);
}

// ── Filtros ───────────────────────────────────────────────────
function toggleFiltro(chip) {
  const tipo = chip.dataset.tipo;
  if (filtrosAtivos.has(tipo)) {
    filtrosAtivos.delete(tipo);
    chip.classList.remove("on");
  } else {
    filtrosAtivos.add(tipo);
    chip.classList.add("on");
  }
  buscarLogs();
}

// ── Escape HTML ───────────────────────────────────────────────
function esc(s) {
  return String(s || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Init ──────────────────────────────────────────────────────
carregarNgrokUrl().then(buscarLogs);
iniciarAuto();
</script>
</body>
</html>
